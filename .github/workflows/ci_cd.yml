name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Code Quality ────────────────────────────────────────────
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install ruff black

      - name: Lint with ruff
        run: ruff check src/

      - name: Check formatting with black
        run: black --check src/

  # ── 2. Unit Tests ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 3. Docker Build & Smoke Test ──────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -f Docker/Dockerfile -t breast-seg-api:${{ github.sha }} .

      - name: Smoke test — health endpoint
        run: |
          docker run -d \
            -p 8000:8000 \
            --name breast-seg-test \
            -e CHECKPOINT_PATH=/app/checkpoints/best.pt \
            breast-seg-api:${{ github.sha }} || true

          # Wait for container to start
          sleep 8

          # Health check — we expect ok or checkpoint warning, not a crash
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
          echo "Health endpoint returned: $RESPONSE"

          docker stop breast-seg-test || true
          docker rm breast-seg-test || true

          # 200 = model loaded, 500 = running but no checkpoint (acceptable in CI)
          if [ "$RESPONSE" = "000" ]; then
            echo "❌ Container failed to start"
            exit 1
          fi
          echo "✅ Container started successfully"