name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Code Quality ────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install ruff black

      - name: Black check
        run: black --check src/ tests/ hf_spaces_app.py

      - name: Ruff lint
        run: ruff check src/ tests/ hf_spaces_app.py --ignore E501

  # ── 2. Unit Tests ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: code-quality

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION:            ${{ secrets.AWS_REGION }}
      S3_BUCKET_LOGS:        ${{ secrets.S3_BUCKET_LOGS }}
      S3_BUCKET_UPLOADS:     ${{ secrets.S3_BUCKET_UPLOADS }}
      S3_ENABLED:            "false"
      WANDB_API_KEY:         ${{ secrets.WANDB_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 3. Docker Build & Smoke Test ──────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Docker/Dockerfile -t breast-seg-api:${{ github.sha }} .

      - name: Smoke test — health endpoint
        run: |
          docker run -d \
            -p 8000:8000 \
            --name breast-seg-test \
            -e CHECKPOINT_PATH=/app/checkpoints/best.pt \
            -e S3_ENABLED=false \
            breast-seg-api:${{ github.sha }} || true

          sleep 8

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
          echo "Health endpoint returned: $RESPONSE"

          docker logs breast-seg-test || true
          docker stop breast-seg-test || true
          docker rm breast-seg-test || true

          if [ "$RESPONSE" = "000" ]; then
            echo "❌ Container failed to start"
            exit 1
          fi
          echo "✅ Container started successfully"

  # ── 4. Deploy to HuggingFace Spaces ───────────────────────────
  deploy-hf-spaces:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to HuggingFace Spaces
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python - <<'PYEOF'
          import os
          from huggingface_hub import HfApi

          api      = HfApi(token=os.environ["HF_TOKEN"])
          username = os.environ["HF_USERNAME"]
          repo_id  = f"{username}/breast-ultrasound-segmentation"

          # Create Space if it doesn't exist
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="gradio",
                  exist_ok=True,
              )
              print(f"Space ready: {repo_id}")
          except Exception as e:
              print(f"Repo creation: {e}")

          # Upload all necessary files
          files_to_upload = [
              ("hf_spaces_app.py", "app.py"),
              ("src/model.py",     "src/model.py"),
              ("src/config.py",    "src/config.py"),
              ("src/metrics.py",   "src/metrics.py"),
              ("src/utils.py",     "src/utils.py"),
              ("requirements.txt", "requirements.txt"),
          ]

          for local_path, hf_path in files_to_upload:
              if os.path.exists(local_path):
                  api.upload_file(
                      path_or_fileobj=local_path,
                      path_in_repo=hf_path,
                      repo_id=repo_id,
                      repo_type="space",
                  )
                  print(f"Uploaded: {local_path} → {hf_path}")
              else:
                  print(f"Skipped (not found): {local_path}")

          print(f"\n✅ Deployed: https://huggingface.co/spaces/{repo_id}")
          PYEOF